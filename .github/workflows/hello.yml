#workflow
#should have a name
name: hello
#On tell when the workflow should run
on:
  workflow_dispatch:

#job tell what the workflow should do, there can be one or more than one job , job is an object so need indentation
#should be inside the workflow

jobs:
  say-hello:
    # create an ephermal container with ubuntu running
    runs-on: ubuntu-latest
    # that ephermal container will have steps to execute, hence name those steps
    steps:
      -name: Say hello to everyone
       run: echo "hello dosto"
       
#stages
#should be inside the job

#actions
#should be inside the steps
